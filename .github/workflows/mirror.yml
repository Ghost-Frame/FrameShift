name: Mirror to Syntheos-Systems
on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Push mirror
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git remote add mirror https://x-access-token:${MIRROR_TOKEN}@github.com/Syntheos-Systems/FrameShift.git
          # Materialize every origin branch as a local head before mirroring.
          # An Actions checkout only has the pushed branch as a local head, so a
          # bare `git push --mirror` would try to delete every other branch on
          # the mirror (including its default `main`) and fail. Recreating the
          # full branch set locally keeps mirror semantics -- including genuine
          # deletions on `delete` events -- without nuking the default branch.
          git fetch --prune origin
          for ref in $(git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin | grep -v '^HEAD$'); do
            git branch -f "$ref" "refs/remotes/origin/$ref" || true
          done
          git push mirror --mirror