# Continuous integration for the Frameshift workspace.
#
# Gates every pull request (and pushes to the default branch) on formatting,
# lints, the unit/integration test suite, the Docker-gated Postgres tests, and
# a supply-chain advisory scan. Every Rust job uses the workspace's declared
# minimum toolchain so dependency drift cannot silently raise the real MSRV.
name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Default token scope for jobs that only read and test repository content.
permissions:
  contents: read

# Only keep the latest run per ref alive; cancel superseded runs to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Formatting check. Does not compile anything, so it needs no system libs and
  # fails fast on style drift.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Lints. clippy compiles the whole workspace (all targets), so it needs
  # libpq-dev for the diesel/pq-sys-backed catalog crate. -D warnings makes any
  # lint a hard failure.
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
          components: clippy
      - name: Install libpq
        run: sudo apt-get update -q && sudo apt-get install -y libpq-dev
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings

  # The embeddings feature is off by default. The workspace-wide jobs above DO
  # compile frameshift-embed-candle itself (it is a plain workspace member with
  # unconditional deps), but nothing compiles the feature-gated consumer glue
  # in the CLI / MCP / daemon (make_embedder, shared_embedder, the
  # CachedEmbedder wiring). This job keeps that glue from rotting, and runs as
  # its own job so the candle compile stays off the clippy job's critical path.
  check-embeddings:
    name: Check embeddings feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
      - name: Install libpq
        run: sudo apt-get update -q && sudo apt-get install -y libpq-dev
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --locked -p frameshift-cli -p frameshift-mcp -p frameshift-daemon --all-targets --features embeddings

  # Unit and integration tests. The Postgres integration tests are gated behind
  # #[ignore = "requires Docker"], so plain `cargo test --workspace` skips them
  # and runs fast without a database.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
      - name: Install libpq
        run: sudo apt-get update -q && sudo apt-get install -y libpq-dev
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --workspace

  # The Docker-gated Postgres integration tests. testcontainers starts its own
  # postgres containers against the runner's Docker daemon (no service block or
  # DATABASE_URL needed); migrations run inside PostgresCatalog::new(). Pre-pull
  # the shared image once so parallel tests cannot race while populating Docker's
  # cold image cache. Scoped to the one crate that owns these tests so
  # --include-ignored stays narrow.
  test-postgres:
    name: Test (Postgres integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
      - name: Install libpq
        run: sudo apt-get update -q && sudo apt-get install -y libpq-dev
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Pre-pull Postgres image
        run: docker pull postgres:11-alpine
      - run: cargo test --locked -p frameshift-catalog-postgres -- --include-ignored

  # Supply-chain advisory scan against the RustSec database. Now blocking: the
  # advisory backlog has been triaged and the vulnerable dependencies bumped, so
  # a new advisory should fail the pipeline rather than slip in silently.
  #
  # Each ignore below is a transitive advisory with no available fix and no
  # runtime-reachable attack surface. Re-evaluate each when its upstream ships:
  #
  # - RUSTSEC-2024-0370 (proc-macro-error, unmaintained): a build-time-only
  #   proc-macro pulled transitively by age -> i18n-embed-fl; it never ships in
  #   any runtime artifact, and the only way to drop it is to bump age from 0.10
  #   to the 0.11 BETA, unacceptable for the crate backing local vault
  #   encryption. Re-evaluate when age ships a stable 0.11.
  #
  # - RUSTSEC-2024-0436 (paste, unmaintained): a compile-time macro dependency
  #   with no runtime parser or network surface. Re-evaluate when upstream
  #   crates remove it.
  #
  # - RUSTSEC-2026-0194 + RUSTSEC-2026-0195 (quick-xml < 0.41, DoS: quadratic
  #   duplicate-attribute check and unbounded namespace-declaration allocation):
  #   pulled ONLY by object_store 0.13 -> frameshift-objects-r2 (R2 storage, aws
  #   feature) -> frameshift-server. quick-xml parses XML responses from the
  #   Cloudflare R2 / S3 API, a trusted TLS peer, not attacker-controlled input,
  #   so the DoS is not reachable by external users. The fix requires object_store
  #   to bump to quick-xml >= 0.41; the latest object_store (0.14.0) still pins
  #   ^0.40.1, and 0.41 does not satisfy that range so a [patch] cannot force it.
  #   quick-xml is mandatory for object_store's aws/cloud feature, so it cannot be
  #   feature-dropped. Re-evaluate when object_store releases against quick-xml
  #   >= 0.41 (then bump object_store in frameshift-objects-r2 and drop these two).
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2024-0370,RUSTSEC-2024-0436,RUSTSEC-2026-0194,RUSTSEC-2026-0195

# Later tier (intentionally not yet wired, tracked in the roadmap):
#   - cargo-deny (needs a deny.toml: license allowlist, ban list, advisory policy)
#   - cargo doc --no-deps --workspace to catch broken intra-doc links
#   - coverage (cargo-llvm-cov) once the currently-untested crates gain tests
#   - .github/dependabot.yml for weekly Cargo updates
