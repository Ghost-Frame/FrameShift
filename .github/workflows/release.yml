# Builds both end-user binaries for the early-access platforms and publishes
# checksummed archives when a semantic version tag is pushed. Windows artifacts
# may remain unsigned only while the ALLOW_UNSIGNED_EARLY_ACCESS repository
# variable is true. macOS is intentionally withheld until Developer ID signing
# and notarization credentials are available.
name: Release binaries

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: frameshift-linux-x86_64
            windows: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset: frameshift-windows-x86_64
            windows: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - name: Verify tag matches binary versions
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cli_version="$(sed -n '/^version = /{s/version = "\([^"]*\)"/\1/p;q;}' crates/frameshift-cli/Cargo.toml)"
          mcp_version="$(sed -n '/^version = /{s/version = "\([^"]*\)"/\1/p;q;}' crates/frameshift-mcp/Cargo.toml)"
          test "$tag_version" = "$cli_version"
          test "$tag_version" = "$mcp_version"
      - name: Build CLI and MCP server
        run: cargo build --locked --release --package frameshift-cli --package frameshift-mcp --target ${{ matrix.target }}
      - name: Validate Windows signing secrets
        if: github.ref_type == 'tag' && runner.os == 'Windows' && vars.ALLOW_UNSIGNED_EARLY_ACCESS != 'true'
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$WINDOWS_CERTIFICATE"
          test -n "$WINDOWS_CERTIFICATE_PASSWORD"
      - name: Sign Windows binaries
        if: github.ref_type == 'tag' && runner.os == 'Windows' && vars.ALLOW_UNSIGNED_EARLY_ACCESS != 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "frameshift-certificate.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) { throw "signtool.exe was not found" }
          $binaries = @(
            "target/${{ matrix.target }}/release/frameshift.exe",
            "target/${{ matrix.target }}/release/frameshift-mcp.exe"
          )
          foreach ($binary in $binaries) {
            & $signTool.FullName sign /f $certificate /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $binary
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $binary" }
            & $signTool.FullName verify /pa /v $binary
            if ($LASTEXITCODE -ne 0) { throw "Signature verification failed for $binary" }
          }
      - name: Package Unix archive
        if: ${{ !matrix.windows }}
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.asset }}"
          cp "target/${{ matrix.target }}/release/frameshift" "dist/${{ matrix.asset }}/"
          cp "target/${{ matrix.target }}/release/frameshift-mcp" "dist/${{ matrix.asset }}/"
          cp README.md LICENSE "dist/${{ matrix.asset }}/"
          tar -C dist -czf "dist/${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          cd dist
          shasum -a 256 "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.sha256"
      - name: Package Windows archive
        if: ${{ matrix.windows }}
        shell: pwsh
        run: |
          $folder = "dist/${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path $folder | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/frameshift.exe" $folder
          Copy-Item "target/${{ matrix.target }}/release/frameshift-mcp.exe" $folder
          Copy-Item README.md, LICENSE $folder
          $archive = "dist/${{ matrix.asset }}.zip"
          Compress-Archive -Path "$folder/*" -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.asset }}.zip" | Set-Content -NoNewline "dist/${{ matrix.asset }}.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.zip
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: ignore

  publish:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Build combined checksum manifest
        shell: bash
        run: cat artifacts/*.sha256 > artifacts/SHA256SUMS
      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
          EARLY_ACCESS: ${{ vars.ALLOW_UNSIGNED_EARLY_ACCESS }}
        shell: bash
        run: |
          release_flags=()
          if [ "$EARLY_ACCESS" = "true" ]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*.tar.gz artifacts/*.zip artifacts/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            "${release_flags[@]}" \
            --title "FrameShift $GITHUB_REF_NAME"
